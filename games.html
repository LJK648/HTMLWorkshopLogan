<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vernball Games</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<style>
body { font-family: Tahoma, Verdana, sans-serif; background: #f4f4f4; display: flex; flex-direction: column; min-height: 100vh; }
.navbar { background-color: #800000; }
.navbar .navbar-brand { font-weight: bold; }
main { flex: 1; }
.container { margin-top: 30px; margin-bottom: 40px; }
.card { border: 1px solid #ddd; border-radius: 10px; }
.card-title { font-size: 1.25rem; font-weight: 700; }
.card .btn { margin-top: 10px; }
.footer { background-color: #800000; color: white; text-align: center; padding: 30px 0; }
.footer a { color: white; text-decoration: none; margin: 0 10px; }
.footer a:hover { text-decoration: underline; }
.footer p { margin: 5px 0; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand" href="index.html">Vernball League</a>
<div>
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="register.html">Player Registration</a></li>
<li class="nav-item"><a class="nav-link" href="hof.html">Hall of Fame</a></li>
<li class="nav-item"><a class="nav-link active" href="games.html">Games</a></li>
</ul>
</div>
</div>
</nav>
<div class="container">
<h1 class="text-center mb-4">Vernball Game Management</h1>
<div class="row g-4">
<div class="col-lg-6">
<div class="card p-4">
<h4>Add New Game</h4>
<form id="gameForm">
<div class="mb-3">
<label class="form-label" for="gameName">Game Name</label>
<input class="form-control" id="gameName" name="gameName" type="text" required>
</div>
<div class="mb-3">
<label class="form-label" for="sport">Sport</label>
<select class="form-select" id="sport" name="sport" required>
<option value="Basketball">Basketball</option>
<option value="Football">Football</option>
<option value="Soccer">Soccer</option>
<option value="Baseball">Baseball</option>
</select>
</div>
<div class="mb-3">
<label class="form-label" for="dateTime">Date & Time</label>
<input class="form-control" id="dateTime" name="dateTime" type="datetime-local" required>
</div>
<div class="mb-3">
<label class="form-label" for="location">Location</label>
<input class="form-control" id="location" name="location" type="text" required>
</div>
<button class="btn btn-primary" type="submit">Create Game</button>
</form>
</div>
</div>
<div class="col-lg-6">
<div class="mb-3">
<label class="form-label" for="search">Search Games</label>
<input class="form-control" id="search" type="search" placeholder="Search by game name or sport">
</div>
<div id="gamesContainer"></div>
</div>
</div>
</div>
<footer class="footer">
<div class="container text-center">
<h5>Vernball Rec League</h5>
<p>Building Community through recreation and competition.</p>
<div class="footer-links">
<a href="index.html">Home</a> |
<a href="register.html">Player Registration</a> |
<a href="hof.html">Hall of Fame</a> |
<a href="games.html">Games</a>
</div>
<p class="copyright">© 2026 Vernball Rec League | VERN LLC</p>
</div>
</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="games.js"></script>
</body>
</html>
